<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小米笔记</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;--accent:#ff6700;--accent2:#58a6ff;--tag-bg:#1f2a37;--tag-text:#79c0ff;--radius:6px;--shadow:0 1px 4px rgba(0,0,0,.3);--danger:#da3633;--success:#3fb950}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.hd{max-width:1100px;margin:0 auto;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.hd h1{font-size:1.2rem;white-space:nowrap;color:var(--accent);user-select:none;cursor:pointer}
.hd-right{display:flex;align-items:center;gap:6px}
.search{width:200px;padding:7px 12px;border:1px solid var(--border);border-radius:16px;background:var(--bg);color:var(--text);font-size:.85rem;outline:none}
.search:focus{border-color:var(--accent)}
.btn{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:16px;cursor:pointer;font-size:.82rem;white-space:nowrap;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-ghost{padding:5px 12px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:16px;cursor:pointer;font-size:.8rem;white-space:nowrap;transition:all .15s}
.btn-ghost:hover{color:var(--text);border-color:var(--accent)}
.btn input{display:none}
main{max-width:1100px;margin:0 auto;padding:20px}
.stats{color:var(--muted);font-size:.83rem;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px}
.tab{padding:4px 12px;border:1px solid var(--border);border-radius:14px;background:var(--card);cursor:pointer;font-size:.82rem;user-select:none;color:var(--muted)}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab .n{font-size:.75rem;opacity:.7;margin-left:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all .15s}
.card:hover{border-color:var(--accent2);box-shadow:var(--shadow)}
.card h3{font-size:1rem;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .meta{font-size:.8rem;color:var(--muted);margin-bottom:6px}
.card .summary{font-size:.87rem;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.card .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{padding:2px 8px;background:var(--tag-bg);color:var(--tag-text);border-radius:10px;font-size:.73rem}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;margin:16px 0}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(255,103,0,0.04)}
.upload-zone .icon{font-size:2.2rem;margin-bottom:10px}
.upload-zone .title{font-size:1rem;color:var(--text);margin-bottom:4px}
.upload-zone .hint{font-size:.82rem;color:var(--muted)}
.upload-zone input{display:none}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 20px;border-radius:16px;font-size:.87rem;z-index:999;transition:all .3s;opacity:0;pointer-events:none}
.toast.show{opacity:1}
.toast.error{background:var(--danger)}
.back{display:inline-block;margin-bottom:14px;color:var(--accent2);text-decoration:none;font-size:.88rem;cursor:pointer}
.back:hover{text-decoration:underline}
.detail{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:26px 30px}
.detail h2{font-size:1.4rem;margin-bottom:10px}
.detail .dm{font-size:.84rem;color:var(--muted);margin-bottom:14px}
.detail .body{font-size:1rem;line-height:1.85;color:#e6edf3}
.detail .body h1{font-size:1.25rem;margin:18px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.detail .body h2{font-size:1.1rem;margin:14px 0 6px}
.detail .body h3{font-size:1rem;margin:10px 0 4px}
.detail .body p{margin-bottom:8px}
.detail .body pre{background:#0d1117;padding:12px 14px;border-radius:var(--radius);overflow-x:auto;margin:8px 0;font-size:.86rem;border:1px solid var(--border)}
.detail .body code{background:#1f2a37;padding:2px 6px;border-radius:4px;font-size:.86em}
.detail .body pre code{background:none;padding:0}
.detail .body blockquote{border-left:3px solid var(--accent);padding:2px 12px;color:var(--muted);margin:8px 0}
.detail .body ul,.detail .body ol{padding-left:20px;margin:6px 0}
.detail .body li{margin:3px 0}
.detail .body img{max-width:100%;border-radius:var(--radius)}
.detail .body a{color:var(--accent2)}
.detail .body table{width:100%;border-collapse:collapse;margin:10px 0}
.detail .body th,.detail .body td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.detail .body th{background:#1f2a37}
.detail-actions{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px 24px;max-width:420px;width:90%}
.modal h3{font-size:1rem;margin-bottom:10px}
.modal p{color:var(--muted);font-size:.87rem;margin-bottom:12px}
.modal ol{margin:8px 0 0 20px;font-size:.87rem;line-height:1.8}
.modal li{margin-bottom:4px}
.modal code{background:#1f2a37;padding:2px 5px;border-radius:3px;font-size:.82em}
.modal a{color:var(--accent2)}
.modal-btns{display:flex;gap:6px;justify-content:flex-end}
.modal.steps{max-width:480px;max-height:80vh;overflow-y:auto}
@media(max-width:640px){.hd{flex-wrap:wrap}.search{width:100%}.grid{grid-template-columns:1fr}.detail{padding:16px}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<header><div class="hd">
<h1 onclick="showList('全部','')">📝 小米笔记</h1>
<div class="hd-right">
  <input class="search" id="search" placeholder="搜索..." autocomplete="off">
  <label class="btn">📥 导入<input type="file" id="fileInput" accept=".zip,.json,.md" multiple></label>
  <button class="btn-ghost" id="btnOrganize" title="重新整理分类">🔄</button>
  <button class="btn-ghost" id="btnHelp" title="帮助">❓</button>
  <button class="btn-ghost" id="btnClear" title="清空数据">🗑</button>
</div></div></header>
<main><div class="toast" id="toast"></div><div id="app"></div></main>
<div id="modalContainer"></div>

<script>
// ========== 数据层 ==========
var STORAGE_KEY = 'mi_notes_data_v2';
var NOTES = [];
var nextId = 1;

function loadNotes() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { var d = JSON.parse(raw); NOTES = d.notes || []; nextId = d.nextId || 1; }
  } catch(e) { NOTES = []; nextId = 1; }
}
function saveNotes() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ notes: NOTES, nextId: nextId }));
  } catch(e) {
    toast('保存失败：存储空间不足，请清理一些笔记', true);
  }
}
function clearNotes() { NOTES = []; nextId = 1; saveNotes(); }

// ========== 分类规则 ==========
var CATEGORY_RULES = [
  { cat: '交易复盘', kw: ['交易','合约','做空','做多','止损','止盈','SRSI','MAE','MFE','复盘','仓位','杠杆','开仓','平仓','盈亏','胜率','回撤','模拟盘'] },
  { cat: '策略研究', kw: ['策略','参数','调优','K线','周期','趋势','震荡','指标','EMA','MACD','RSI','布林','均线','信号','入场','出场','突破'] },
  { cat: '标的分析', kw: ['DOGE','PUMP','ORDI','APT','WLD','BTC','ETH','AXS','标的','行情','波动','振幅','流动性','深度','新币','山寨'] },
  { cat: '编程技术', kw: ['代码','编程','Python','JavaScript','React','Chart','API','前端','后端','数据库','服务器','Git','Docker','部署','框架','算法','bug','debug','重构','CDN'] },
  { cat: '工具配置', kw: ['配置','安装','部署','CloudStudio','Vercel','Render','GitHub','域名','SSL','HTTPS','CORS','代理','Token','Actions'] },
  { cat: '学习笔记', kw: ['学习','读书','课程','教程','知识点','概念','总结','心得','理解','原理','源码'] },
  { cat: '工作项目', kw: ['工作','项目','需求','产品','设计','测试','上线','发布','周报','日报','OKR','KPI','方案'] },
  { cat: '生活随记', kw: ['日常','生活','美食','旅游','深圳','周末','电影','音乐','游戏','购物','运动','健身','跑步','游泳','天气'] },
  { cat: '想法灵感', kw: ['想法','灵感','随笔','随记','感想','思考','反思','计划','目标','TODO'] },
];

function classifyNote(note) {
  var text = (note.title + ' ' + (note.content||'')).toLowerCase();
  var bestCat = '其他'; var bestScore = 0;
  for (var i = 0; i < CATEGORY_RULES.length; i++) {
    var rule = CATEGORY_RULES[i], score = 0;
    for (var j = 0; j < rule.kw.length; j++) {
      if (text.indexOf(rule.kw[j].toLowerCase()) !== -1) score++;
    }
    if (score > bestScore) { bestScore = score; bestCat = rule.cat; }
  }
  note.category = bestCat;
}

function extractTags(note) {
  var text = note.title + ' ' + (note.content||'');
  var tags = [];
  var htags = text.match(/#[\w\u4e00-\u9fff]+/g) || [];
  for (var i = 0; i < htags.length; i++) tags.push(htags[i].slice(1));
  var en = text.match(/[A-Z]{2,}/g) || [];
  for (var i = 0; i < en.length; i++) tags.push(en[i].toUpperCase());
  var seen = {};
  var result = [];
  for (var i = 0; i < tags.length && result.length < 8; i++) {
    if (!seen[tags[i]]) { seen[tags[i]] = true; result.push(tags[i]); }
  }
  note.tags = result;
}

// ========== 工具函数 ==========
function cleanContent(text) {
  if (!text) return '';
  var t = text.replace(/<br\s*\/?>/gi, '\n');
  t = t.replace(/<\/p>\s*<p[^>]*>/gi, '\n\n');
  t = t.replace(/<[^>]+>/g, '');
  t = t.replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"');
  return t.replace(/\n{3,}/g, '\n\n').trim();
}

function formatDate(ts) {
  if (!ts) return '未知';
  var d = new Date(typeof ts === 'number' ? (ts > 1e12 ? ts : ts * 1000) : ts);
  if (isNaN(d.getTime())) return '未知';
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function wordCount(text) {
  if (!text) return 0;
  return ((text.match(/[\u4e00-\u9fff]/g) || []).length + (text.match(/[a-zA-Z]+/g) || []).length);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function md2html(t) {
  if (!t) return '';
  t = String(t);
  t = t.replace(/```(\w*)\n([\s\S]*?)```/g, function(_,lang,code){ return '<pre><code>'+esc(code.trim())+'</code></pre>'; });
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  t = t.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  t = t.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  t = t.replace(/^---$/gm, '<hr>');
  t = t.split(/\n\n+/).map(function(p) {
    p = p.trim();
    if (!p) return '';
    if (/^<(h[1-4]|pre|ul|ol|blockquote|hr|table|img|code)/.test(p)) return p;
    if (/^[-*] /.test(p)) { var items = p.split('\n'); return '<ul>'+items.map(function(l){return '<li>'+l.replace(/^[-*] /,'')+'</li>';}).join('')+'</ul>'; }
    return '<p>'+p.replace(/\n/g,'<br>')+'</p>';
  }).join('\n');
  return t;
}

function debounce(fn, ms) { var t; return function(){ clearTimeout(t); t=setTimeout(function(){fn.apply(this,arguments);},ms); }; }

// ========== Toast ==========
function toast(msg, isErr) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isErr ? ' error' : '');
  requestAnimationFrame(function(){ el.className = 'toast show' + (isErr ? ' error' : ''); });
  setTimeout(function(){ el.className = 'toast'; }, 2500);
}

// ========== Modal ==========
function showConfirm(msg, onOk) {
  var mc = document.getElementById('modalContainer');
  mc.innerHTML = '<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()"><h3>确认</h3><p>'+msg+'</p><div class="modal-btns"><button class="btn-ghost" onclick="document.getElementById(\'modalContainer\').innerHTML=\'\'">取消</button><button class="btn" id="confirmBtn">确定</button></div></div></div>';
  document.getElementById('confirmBtn').onclick = function(){ mc.innerHTML = ''; onOk(); };
}

function showHelp() {
  var mc = document.getElementById('modalContainer');
  mc.innerHTML = '<div class="modal-overlay" onclick="this.remove()"><div class="modal steps" onclick="event.stopPropagation()"><h3>📝 如何导入笔记</h3><ol><li>电脑打开 <a href="https://i.mi.com/note/h5" target="_blank">i.mi.com</a> 登录</li><li>F12 → Console，粘贴<a href="https://cdn.jsdelivr.net/gh/YYYcjj/mi-notes-organizer@master/mi-notes-export.js" target="_blank">导出脚本</a> → 回车</li><li>下载 JSON → 拖入本页面</li></ol><p style="font-size:.78rem;color:var(--muted);margin-top:8px">💡 也可直接拖入 ZIP / MD 文件。点 🔄 可重新整理分类和标签。</p><div class="modal-btns"><button class="btn-ghost" onclick="document.getElementById(\'modalContainer\').innerHTML=\'\'">关闭</button></div></div></div>';
}

// ========== 文件解析 ==========
function parseJsonContent(text, filename) {
  var results = [];
  try {
    var data = JSON.parse(text);
    if (!Array.isArray(data)) {
      if (Array.isArray(data.notes)) data = data.notes;
      else if (Array.isArray(data.activeNotes)) data = data.activeNotes;
      else if (Array.isArray(data.data)) data = data.data;
      else data = [data];
    }
    for (var i = 0; i < data.length; i++) {
      var item = data[i];
      if (!item.title && !item.content) continue;
      results.push({
        title: item.title || '无标题',
        content: cleanContent(item.content || item.text || item.body || item.summary || ''),
        folder: item.folder || item.category || item.notebook || '',
        createdAt: item.createdAt || item.created_at || item.createTime || Date.now(),
        modifiedAt: item.modifiedAt || item.modified_at || item.updateTime || Date.now(),
      });
    }
  } catch(e) {
    var lines = text.split('\n').filter(function(l){return l.trim();});
    if (lines.length > 0) results.push({ title: filename.replace(/\.json$/i,''), content: text.substring(0, 10000), createdAt: Date.now(), modifiedAt: Date.now() });
  }
  return results;
}

function parseMarkdownContent(text, filename) {
  var title = filename.replace(/\.md$/i, '').replace(/^.*[/\\]/, '');
  var content = text;
  var fm = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (fm) { content = fm[2]; var tm = fm[1].match(/^title:\s*(.+)$/m); if (tm) title = tm[1].replace(/['"]/g, ''); }
  var h1 = content.match(/^#\s+(.+)$/m);
  if (h1 && title === filename.replace(/\.md$/i,'')) title = h1[1];
  return [{ title: title || '无标题', content: cleanContent(content), createdAt: Date.now(), modifiedAt: Date.now() }];
}

async function parseZip(file) {
  var notes = [];
  var zip = await JSZip.loadAsync(file);
  var files = Object.keys(zip.files);
  for (var i = 0; i < files.length; i++) {
    var name = files[i];
    if (zip.files[name].dir) continue;
    try {
      if (name.toLowerCase().endsWith('.json')) {
        var t = await zip.files[name].async('string');
        notes.push.apply(notes, parseJsonContent(t, name));
      } else if (name.toLowerCase().endsWith('.md')) {
        var t = await zip.files[name].async('string');
        notes.push.apply(notes, parseMarkdownContent(t, name));
      }
    } catch(e) {}
  }
  return notes;
}

// ========== 导入处理 ==========
async function importFiles(files) {
  var newNotes = [];
  for (var i = 0; i < files.length; i++) {
    var f = files[i], fn = f.name.toLowerCase();
    try {
      if (fn.endsWith('.zip')) { var p = await parseZip(f); newNotes.push.apply(newNotes, p); }
      else if (fn.endsWith('.json')) { var t = await f.text(); newNotes.push.apply(newNotes, parseJsonContent(t, f.name)); }
      else if (fn.endsWith('.md')) { var t = await f.text(); newNotes.push.apply(newNotes, parseMarkdownContent(t, f.name)); }
    } catch(e) {}
  }

  var existing = {};
  for (var i = 0; i < NOTES.length; i++) existing[NOTES[i].title] = true;

  var total = 0;
  for (var i = 0; i < newNotes.length; i++) {
    var n = newNotes[i];
    if (!n.title) n.title = '无标题';
    if (!n.content) n.content = '';

    var title = n.title, c = 1;
    while (existing[title]) { title = n.title + ' (' + (++c) + ')'; }
    n.title = title; existing[title] = true;

    classifyNote(n); extractTags(n);
    n.id = nextId++;
    n.summary = (n.content||'').substring(0, 200).replace(/\n/g, ' ');
    n.date = formatDate(n.createdAt);
    n.wordCount = wordCount(n.content);
    NOTES.push(n); total++;
  }

  saveNotes();
  showList('全部');
  toast('已导入 ' + total + ' 篇笔记');
}

async function importFromJson(items) {
  var existing = {};
  for (var i = 0; i < NOTES.length; i++) existing[NOTES[i].title] = true;

  var cnt = 0;
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    if (!item.title) item.title = '无标题';
    if (!item.content) item.content = '';
    var title = item.title, c = 1;
    while (existing[title]) { title = item.title + ' (' + (++c) + ')'; }
    existing[title] = true;
    var note = { id: nextId++, title: title, content: item.content||'', category: '', createdAt: item.createdAt||Date.now(), modifiedAt: item.modifiedAt||Date.now(), tags: [] };
    classifyNote(note); extractTags(note);
    note.summary = (note.content||'').substring(0, 200).replace(/\n/g, ' ');
    note.date = formatDate(note.createdAt);
    note.wordCount = wordCount(note.content);
    NOTES.push(note); cnt++;
  }
  saveNotes();
  return cnt;
}

// ========== 整理 ==========
function organizeAll() {
  for (var i = 0; i < NOTES.length; i++) {
    var n = NOTES[i];
    n.category = ''; n.tags = [];
    if (n.content) { n.content = n.content.replace(/\n{3,}/g, '\n\n').replace(/^\s+|\s+$/gm, '').trim(); }
    classifyNote(n); extractTags(n);
    n.summary = (n.content||'').substring(0, 200).replace(/\n/g, ' ');
    n.wordCount = wordCount(n.content);
  }
  saveNotes();
}

// ========== UI 渲染 ==========
var currentCat = '全部';
var currentQuery = '';

function showList(cat, query) {
  currentCat = cat || '全部';
  currentQuery = query || '';
  var app = document.getElementById('app');

  if (!NOTES.length) {
    app.innerHTML = '<div style="text-align:center;padding:60px 20px;max-width:460px;margin:0 auto"><div style="font-size:2.5rem;margin-bottom:12px">📝</div><div style="font-size:1.1rem;color:var(--text);margin-bottom:8px;font-weight:bold">小米笔记</div><div style="font-size:.85rem;color:var(--muted);margin-bottom:28px">从小米云导出 JSON，拖入这里浏览</div><button onclick="startMiImport()" style="width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:.95rem;cursor:pointer;margin-bottom:20px">🔐 从小米云一键导入</button><div class="upload-zone" id="dropZone"><div class="icon">📂</div><div class="title">或者拖拽文件导入</div><div class="hint">支持 ZIP · JSON · Markdown</div><input type="file" id="dropInput" accept=".zip,.json,.md" multiple></div></div>';
    bindDropZone();
    return;
  }

  var cats = {}; var totalWords = 0;
  for (var i = 0; i < NOTES.length; i++) { var c = NOTES[i].category||'其他'; cats[c] = (cats[c]||0)+1; totalWords += NOTES[i].wordCount||0; }

  var catNames = Object.keys(cats).sort(function(a,b){ return cats[b] - cats[a]; });
  var filtered = NOTES;
  if (currentCat !== '全部') filtered = filtered.filter(function(n){ return (n.category||'其他') === currentCat; });
  if (currentQuery) {
    var q = currentQuery.toLowerCase();
    filtered = filtered.filter(function(n){
      return n.title.toLowerCase().indexOf(q) !== -1 || (n.content||'').toLowerCase().indexOf(q) !== -1 || (n.tags||[]).some(function(t){ return t.toLowerCase().indexOf(q) !== -1; });
    });
  }

  var html = '<div class="stats"><span>共 '+NOTES.length+' 篇 · '+catNames.length+' 类 · '+totalWords.toLocaleString()+' 字</span></div>';
  html += '<div class="tabs"><span class="tab'+(currentCat==='全部'?' active':'')+'" onclick="showList(\'全部\')">全部<span class="n">'+NOTES.length+'</span></span>';
  for (var i = 0; i < catNames.length; i++) {
    var cn = catNames[i];
    html += '<span class="tab'+(currentCat===cn?' active':'')+'" onclick="showList(\''+cn.replace(/'/g,"\\'")+'\')">'+cn+'<span class="n">'+cats[cn]+'</span></span>';
  }
  html += '</div>';

  if (!filtered.length) {
    html += '<div style="text-align:center;padding:40px;color:var(--muted)">没有匹配的笔记</div>';
  } else {
    html += '<div class="grid">';
    for (var i = 0; i < filtered.length; i++) {
      var n = filtered[i];
      html += '<div class="card" onclick="showDetail('+n.id+')"><h3>'+esc(n.title)+'</h3><div class="meta">'+(n.date||'')+' · '+(n.category||'其他')+' · '+(n.wordCount||0)+' 字</div><div class="summary">'+esc((n.summary||'').substring(0,180))+'</div>';
      if (n.tags && n.tags.length) { html += '<div class="tags">'; for (var j = 0; j < Math.min(n.tags.length,5); j++) html += '<span class="tag">'+esc(n.tags[j])+'</span>'; html += '</div>'; }
      html += '</div>';
    }
    html += '</div>';
  }
  app.innerHTML = html;
  document.getElementById('search').value = currentQuery;
}

function showDetail(id) {
  var n = NOTES.find(function(x){ return x.id === id; });
  if (!n) { showList('全部'); return; }
  var app = document.getElementById('app');
  app.innerHTML = '<div class="detail-actions"><span class="back" onclick="showList(currentCat,\''+(currentQuery||'').replace(/'/g,"\\'")+'\')">← 返回</span><button class="btn-ghost" onclick="deleteNote('+n.id+')">🗑 删除</button></div><div class="detail"><h2>'+esc(n.title)+'</h2><div class="dm">'+(n.date||'')+' · '+(n.category||'其他')+' · '+(n.wordCount||0)+' 字</div>'+((n.tags||[]).length?'<div class="tags" style="margin-bottom:14px">'+n.tags.map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('')+'</div>':'')+'<div class="body">'+md2html(n.content||'')+'</div></div>';
  window.location.hash = 'note-'+id;
  document.title = n.title + ' - 小米笔记';
  window.scrollTo(0,0);
}

function deleteNote(id) {
  showConfirm('确定删除这篇笔记？', function(){
    NOTES = NOTES.filter(function(n){ return n.id !== id; });
    saveNotes();
    showList(currentCat, currentQuery);
    toast('已删除');
  });
}

// ========== 拖拽上传 ==========
function bindDropZone() {
  var zone = document.getElementById('dropZone');
  if (!zone) return;
  var inp = document.getElementById('dropInput');
  zone.onclick = function(){ inp.click(); };
  zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', function(){ zone.classList.remove('dragover'); });
  zone.addEventListener('drop', async function(e){
    e.preventDefault(); zone.classList.remove('dragover');
    if (e.dataTransfer.files.length) { toast('解析中...'); await importFiles(e.dataTransfer.files); }
  });
  inp.addEventListener('change', async function(){
    if (inp.files.length) { toast('解析中...'); await importFiles(inp.files); inp.value = ''; }
  });
}

// ========== 小米云导入流程 ==========
function startMiImport() {
  var scriptUrl = 'https://cdn.jsdelivr.net/gh/YYYcjj/mi-notes-organizer@master/mi-notes-export.js';
  var code = '(function(){var s=document.createElement(\'script\');s.src=\''+scriptUrl+'\';document.body.appendChild(s);})()';
  copyText(code);
  window.open('https://i.mi.com/note/h5', '_blank');
  var mc = document.getElementById('modalContainer');
  mc.innerHTML = '<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()"><h3>✅ 脚本已复制，小米云已打开</h3><ol><li>在新标签登录小米账号</li><li>按 <code>F12</code> → <code>Console</code></li><li><code>Ctrl+V</code> 粘贴 → 回车</li><li>下载 JSON → 拖入本页</li></ol><p style="font-size:.75rem;color:var(--muted);margin-top:8px">未自动复制？<a href="#" onclick="copyText(\''+code.replace(/'/g,"\\'")+'\');return false">点此重试</a></p><div class="modal-btns"><button class="btn-ghost" onclick="document.getElementById(\'modalContainer\').innerHTML=\'\'">知道了</button></div></div></div>';
}

function copyText(text) {
  if (navigator.clipboard) { navigator.clipboard.writeText(text).catch(function(){}); }
}

// ========== 初始化 ==========
function init() {
  loadNotes();

  // postMessage 监听（书签导入流程）
  window.addEventListener('message', async function(e) {
    if (e.data && e.data.type === 'mi-notes-import' && e.data.data) {
      try {
        var notes = JSON.parse(e.data.data);
        if (Array.isArray(notes) && notes.length > 0) {
          toast('正在导入 ' + notes.length + ' 条...');
          await importFromJson(notes);
          toast('已导入 ' + notes.length + ' 条笔记！');
          showList('全部');
        }
      } catch(err) { toast('导入失败', true); }
    }
  });

  var hash = window.location.hash;
  if (hash.indexOf('#note-') === 0) { showDetail(parseInt(hash.slice(6))); }
  else { showList('全部'); }

  document.getElementById('search').addEventListener('input', debounce(function(e){ showList(currentCat, e.target.value); }, 200));
  document.getElementById('fileInput').addEventListener('change', async function(){
    if (this.files.length) { toast('解析中...'); await importFiles(this.files); this.value = ''; }
  });
  document.getElementById('btnClear').addEventListener('click', function(){
    if (!NOTES.length) { toast('没有数据'); return; }
    showConfirm('确定清空全部 '+NOTES.length+' 篇笔记？不可恢复。', function(){ clearNotes(); showList('全部'); toast('已清空'); });
  });
  document.getElementById('btnHelp').addEventListener('click', showHelp);
  document.getElementById('btnOrganize').addEventListener('click', function(){
    if (!NOTES.length) { toast('没有笔记'); return; }
    showConfirm('重新整理全部 '+NOTES.length+' 篇笔记的分类和标签？', function(){ organizeAll(); showList('全部'); toast('整理完成！'); });
  });
  document.addEventListener('dragover', function(e){ e.preventDefault(); });
  document.addEventListener('drop', function(e){
    e.preventDefault();
    if (e.dataTransfer.files.length) { toast('解析中...'); importFiles(e.dataTransfer.files); }
  });
}

init();
</script>
</body>
</html>
