name: 自动同步小米笔记

on:
  schedule:
    - cron: '0 2 * * 0'   # 每周日 凌晨2点 (CST 上午10点)
  workflow_dispatch:        # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 创建数据目录
        run: mkdir -p public/data

      - name: 同步小米笔记
        run: |
          docker run --rm \
            -e MI_COOKIE="${{ secrets.MI_COOKIE }}" \
            -v ${{ github.workspace }}/public/data:/app/public/data \
            idootop/mi-note-sync:latest

      - name: 检查更新
        id: check
        run: |
          if [ -f public/data/notes.json ]; then
            echo "notes_count=$(python3 -c "import json; print(len(json.load(open('public/data/notes.json'))))")" >> $GITHUB_OUTPUT
            echo "has_data=true" >> $GITHUB_OUTPUT
          else
            echo "has_data=false" >> $GITHUB_OUTPUT
            echo "::warning::未找到 notes.json，同步可能失败"
          fi

      - name: 提交更新
        if: steps.check.outputs.has_data == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 自动同步小米笔记 (${{ steps.check.outputs.notes_count }} 条)"
          file_pattern: 'public/data/**'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
